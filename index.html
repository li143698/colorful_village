<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多彩乡村 - 美丽乡村宣传展示</title>
    <style>
        :root {
            /* ============ 乡村主题色彩变量 ============ */
            --amber: #F59E0B;
            --amber-light: #FCD34D;
            --amber-dark: #D97706;
            --sunset-orange: #F97316;
            --sunset-peach: #FDBA74;
            --forest-green: #4ADE80;
            --forest-green-dark: #22C55E;
            --leaf-green: #84CC16;
            --sky-blue: #60A5FA;
            --sky-light: #BFDBFE;
            --earth-brown: #92400E;
            --earth-warm: #B45309;
            --rust-red: #DC2626;
            --rust-light: #FCA5A5;
            --cream: #FFF7ED;
            --cream-dark: #FFEDD5;
            --wheat: #FEF3C7;
            --white: #FFFFFF;
            --text-dark: #3E2723;
            --text-medium: #5D4037;
            --text-light: #8D6E63;
            --card-shadow: 0 4px 20px rgba(146, 64, 14, 0.12);
            --card-shadow-hover: 0 12px 36px rgba(146, 64, 14, 0.2);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --max-width: 1320px;
            --nav-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: var(--nav-height);
        }

        body {
            font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background-color: #FFFBF5;
            color: var(--text-dark);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(252, 211, 77, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(96, 165, 250, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 60%, rgba(74, 222, 128, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 30% 80%, rgba(251, 146, 60, 0.05) 0%, transparent 55%);
            background-attachment: fixed;
        }

        /* ============ 导航栏 ============ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(20px, 5vw, 60px);
            background: rgba(255, 251, 245, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(217, 119, 6, 0.1);
            transition: all var(--transition-smooth);
        }
        .navbar.scrolled {
            background: rgba(255, 251, 245, 0.92);
            box-shadow: 0 2px 24px rgba(146, 64, 14, 0.1);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--earth-brown);
            text-decoration: none;
            letter-spacing: -0.02em;
            white-space: nowrap;
        }
        .nav-logo .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--amber), var(--sunset-orange), var(--rust-red));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 3px 12px rgba(249, 115, 22, 0.3);
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                box-shadow: 0 3px 12px rgba(249, 115, 22, 0.3);
            }
            50% {
                box-shadow: 0 6px 24px rgba(249, 115, 22, 0.5);
            }
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-medium);
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 50px;
            transition: all var(--transition-smooth);
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .nav-links a:hover,
        .nav-links a.active {
            background: var(--wheat);
            color: var(--earth-brown);
            font-weight: 600;
        }
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.8rem;
            color: var(--earth-brown);
            padding: 8px;
            line-height: 1;
        }

        /* ============ Hero 区域 ============ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: calc(var(--nav-height) + 40px) 24px 60px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg,
                    #FFFBF5 0%,
                    #FFF7ED 15%,
                    #FFEDD5 35%,
                    #FEF3C7 55%,
                    #FFF7ED 80%,
                    #FFFBF5 100%);
        }
        /* 装饰性浮动元素 */
        .hero-floaters {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .floater {
            position: absolute;
            border-radius: 50%;
            opacity: 0.55;
            animation: floatUpDown 7s ease-in-out infinite;
        }
        .floater:nth-child(1) {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #FCD34D, #F59E0B);
            top: 18%;
            left: 8%;
            animation-delay: 0s;
            animation-duration: 6.5s;
        }
        .floater:nth-child(2) {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #FDBA74, #F97316);
            top: 25%;
            right: 12%;
            animation-delay: 1.5s;
            animation-duration: 7.2s;
        }
        .floater:nth-child(3) {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #86EFAC, #4ADE80);
            top: 60%;
            left: 14%;
            animation-delay: 3s;
            animation-duration: 8s;
        }
        .floater:nth-child(4) {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #BFDBFE, #60A5FA);
            top: 55%;
            right: 8%;
            animation-delay: 2s;
            animation-duration: 6.8s;
        }
        .floater:nth-child(5) {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #FDE68A, #F59E0B);
            top: 35%;
            left: 45%;
            animation-delay: 4s;
            animation-duration: 9s;
        }
        .floater:nth-child(6) {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle, #FCA5A5, #F87171);
            top: 70%;
            right: 25%;
            animation-delay: 0.8s;
            animation-duration: 5.5s;
        }
        @keyframes floatUpDown {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            25% {
                transform: translateY(-30px) scale(1.08);
            }
            50% {
                transform: translateY(-10px) scale(0.95);
            }
            75% {
                transform: translateY(-40px) scale(1.05);
            }
        }
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }
        .hero-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--amber-light), var(--sunset-peach));
            color: var(--earth-brown);
            padding: 8px 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.25);
        }
        .hero h1 {
            font-size: clamp(2.4rem, 6vw, 4.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #B45309, #D97706, #92400E);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        .hero h1 .accent {
            background: linear-gradient(135deg, #F97316, #DC2626);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle {
            font-size: clamp(1.05rem, 2vw, 1.3rem);
            color: var(--text-medium);
            max-width: 550px;
            margin: 0 auto 30px;
            font-weight: 400;
        }
        .hero-stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .hero-stat {
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md);
            padding: 16px 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(217, 119, 6, 0.1);
            transition: all var(--transition-smooth);
        }
        .hero-stat:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
        }
        .hero-stat .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #D97706, #F97316);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-stat .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
        }

        /* ============ 筛选区域 ============ */
        .filter-section {
            position: sticky;
            top: var(--nav-height);
            z-index: 100;
            background: rgba(255, 251, 245, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: 16px;
            padding: 16px clamp(20px, 5vw, 60px);
            border-bottom: 1px solid rgba(217, 119, 6, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-label {
            font-weight: 600;
            color: var(--text-medium);
            font-size: 0.9rem;
            white-space: nowrap;
            margin-right: 4px;
        }
        .filter-btn {
            border: 2px solid #E5E7EB;
            background: var(--white);
            color: var(--text-medium);
            padding: 9px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-smooth);
            white-space: nowrap;
            user-select: none;
        }
        .filter-btn:hover {
            border-color: var(--amber);
            color: var(--earth-brown);
            background: #FFFBF5;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #FEF3C7, #FCD34D);
            border-color: transparent;
            color: #92400E;
            font-weight: 700;
            box-shadow: 0 3px 14px rgba(245, 158, 11, 0.3);
            transform: translateY(-1px);
        }
        .filter-btn .count {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* ============ 照片画廊 ============ */
        .gallery-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 32px clamp(20px, 4vw, 40px) 60px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        @media (min-width: 1400px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 14px;
            }
        }
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
        }
        .gallery-card {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            background: var(--white);
            box-shadow: var(--card-shadow);
            transition: all var(--transition-smooth);
            aspect-ratio: 4 / 3;
            group: true;
        }
        .gallery-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-shadow-hover);
        }
        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gallery-card:hover img {
            transform: scale(1.08);
        }
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    transparent 40%,
                    rgba(62, 39, 35, 0.25) 75%,
                    rgba(62, 39, 35, 0.7) 100%);
            pointer-events: none;
            transition: opacity var(--transition-smooth);
            opacity: 0.7;
        }
        .gallery-card:hover .card-overlay {
            opacity: 1;
        }
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 18px;
            pointer-events: none;
            z-index: 2;
            transform: translateY(0);
            transition: transform var(--transition-smooth);
        }
        .gallery-card:hover .card-info {
            transform: translateY(-4px);
        }
        .card-category-tag {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 50px;
            letter-spacing: 0.03em;
            margin-bottom: 6px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        .tag-scenery {
            background: #4ADE80;
        }
        .tag-architecture {
            background: #D97706;
        }
        .tag-culture {
            background: #F97316;
        }
        .tag-nature {
            background: #60A5FA;
        }
        .tag-food {
            background: #EAB308;
        }
        .tag-craft {
            background: #A855F7;
        }
        .card-title {
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            letter-spacing: 0.01em;
        }
        /* 图片加载占位 */
        .gallery-card .img-placeholder {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #FEF3C7, #FFEDD5, #FDE68A);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #D97706;
            z-index: 0;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }
        .gallery-card img.loaded+.img-placeholder {
            display: none;
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        .empty-state .empty-icon {
            font-size: 5rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .empty-state p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* ============ 灯箱 ============ */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(30, 15, 8, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }
        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 75vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        .lightbox-caption {
            color: #fff;
            text-align: center;
            font-weight: 500;
            font-size: 1rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            max-width: 600px;
        }
        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-smooth);
            z-index: 10;
        }
        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            transform: scale(1.05);
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-smooth);
            z-index: 10;
        }
        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.28);
            border-color: #fff;
        }
        .lightbox-prev {
            left: -70px;
        }
        .lightbox-next {
            right: -70px;
        }
        @media (max-width: 768px) {
            .lightbox-prev {
                left: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .lightbox-next {
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .lightbox-close {
                top: -44px;
                right: 10px;
                width: 38px;
                height: 38px;
                font-size: 1.2rem;
            }
            .lightbox-content {
                max-width: 95vw;
            }
            .lightbox img {
                max-width: 95vw;
                max-height: 65vh;
            }
        }

        /* ============ 页脚 ============ */
        .footer {
            background: linear-gradient(180deg, #FFFBF5, #FEF3C7);
            border-top: 1px solid rgba(217, 119, 6, 0.12);
            text-align: center;
            padding: 32px 20px;
            color: var(--text-light);
            font-size: 0.9rem;
            letter-spacing: 0.02em;
        }
        .footer .footer-decor {
            display: inline-block;
            font-size: 1.4rem;
            margin-bottom: 8px;
        }
        .footer strong {
            color: var(--earth-brown);
        }

        /* ============ 回到顶部按钮 ============ */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F59E0B, #F97316);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            box-shadow: 0 6px 24px rgba(249, 115, 22, 0.35);
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-to-top.visible {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        .back-to-top:hover {
            transform: translateY(-3px) scale(1.06);
            box-shadow: 0 10px 32px rgba(249, 115, 22, 0.5);
        }

        /* ============ 响应式导航 ============ */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background: rgba(255, 251, 245, 0.96);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 16px 20px;
                gap: 4px;
                border-bottom: 2px solid rgba(217, 119, 6, 0.15);
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
                transform: translateY(-120%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                pointer-events: none;
            }
            .nav-links.open {
                transform: translateY(0);
                pointer-events: all;
            }
            .nav-toggle {
                display: block;
            }
            .hero-stats {
                gap: 16px;
            }
            .hero-stat {
                padding: 12px 18px;
            }
            .hero-stat .stat-number {
                font-size: 1.5rem;
            }
            .filter-section {
                gap: 8px;
                padding: 12px 16px;
            }
            .filter-btn {
                padding: 7px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 导航栏 ==================== -->
    <nav class="navbar" id="navbar">
        <a href="#" class="nav-logo">
            <span class="logo-icon">🏡</span>
            <span>多彩乡村</span>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="菜单">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="#home" class="active">首页</a></li>
            <li><a href="#gallery">照片墙</a></li>
            <li><a href="#about">关于</a></li>
        </ul>
    </nav>

    <!-- ==================== Hero 区域 ==================== -->
    <section class="hero" id="home">
        <div class="hero-floaters">
            <div class="floater"></div>
            <div class="floater"></div>
            <div class="floater"></div>
            <div class="floater"></div>
            <div class="floater"></div>
            <div class="floater"></div>
        </div>
        <div class="hero-content">
            <span class="hero-badge">🌟 美丽乡村 · 多彩平沙村</span>
            <h1>用镜头记录<span class="accent">多彩乡村</span></h1>
            <p class="hero-subtitle">
                穿梭于田园阡陌之间，捕捉乡土中国的每一抹动人色彩。
                这里收藏着最质朴的风景、最温暖的记忆。
            </p>
            <div class="hero-stats">
                <div class="hero-stat">
                    <div class="stat-number" id="statPhotos">--</div>
                    <div class="stat-label">📸 收录照片</div>
                </div>
                <div class="hero-stat">
                    <div class="stat-number" id="statCategories">--</div>
                    <div class="stat-label">🏷️ 主题分类</div>
                </div>
                <div class="hero-stat">
                    <div class="stat-number">用心</div>
                    <div class="stat-label">💛 记录乡土</div>
                </div>
            </div>
        </div>
    </section>

    <!-- ==================== 筛选区域 ==================== -->
    <div class="filter-section" id="filterSection">
        <span class="filter-label">🔍 筛选：</span>
        <button class="filter-btn active" data-category="all">全部<span class="count"></span></button>
        <button class="filter-btn" data-category="scenery">🌾 田园风光<span class="count"></span></button>
        <button class="filter-btn" data-category="architecture">🏠 古建民居<span class="count"></span></button>
        <button class="filter-btn" data-category="culture">🎭 民俗活动<span class="count"></span></button>
        <button class="filter-btn" data-category="nature">🌿 自然生态<span class="count"></span></button>
        <button class="filter-btn" data-category="food">🍜 特色美食<span class="count"></span></button>
        <button class="filter-btn" data-category="craft">🧶 手工艺<span class="count"></span></button>
    </div>

    <!-- ==================== 照片画廊 ==================== -->
    <section class="gallery-container" id="gallery">
        <div class="gallery-grid" id="galleryGrid">
            <!-- 照片卡片将由JS动态生成 -->
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📭</div>
            <p>该分类下暂无照片，请选择其他分类查看</p>
        </div>
    </section>

    <!-- ==================== 灯箱 ==================== -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose" aria-label="关闭">✕</button>
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="上一张">‹</button>
            <img src="" alt="" id="lightboxImg">
            <div class="lightbox-caption" id="lightboxCaption"></div>
            <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="下一张">›</button>
        </div>
    </div>

    <!-- ==================== 回到顶部 ==================== -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>

    <!-- ==================== 页脚 ==================== -->
    <footer class="footer" id="about">
        <div class="footer-decor">🏡 🌾 🌻 🏔️ 🌿</div>
        <p>© 2026 <strong>多彩乡村</strong> · 广应科平沙筑梦团</p>
        <p style="font-size:0.8rem;opacity:0.7;">平沙村宣传照片展示平台</p>
    </footer>

    <script>
        (function() {
            // ============================================================
            //  📸  照片数据接口 — 在这里修改或替换照片数据
            // ============================================================
            const PHOTO_DATA = [
                {
                    id: 1,
                    src: './photoes/1.jpg',
                    thumbnail: './photoes/1.jpg',
                    title: '古村临街老宅',
                    description: '充满年代感的岭南老式民居，灯笼点缀街巷，留存乡村旧日烟火气息。',
                    category: 'architecture',
                    date: '2026-06-10'
                },
                {
                    id: 2,
                    src: './photoes/2.jpg',
                    thumbnail: './photoes/2.jpg',
                    title: '田园水渠稻田',
                    description: '平整稻田搭配乡村灌溉水渠，蓝天白云映衬出清新治愈的田园风光。',
                    category: 'scenery',
                    date: '2026-06-10'
                },
                {
                    id: 3,
                    src: './photoes/3.jpg',
                    thumbnail: './photoes/3.jpg',
                    title: '乡村河道街巷',
                    description: '村内河道贯穿民居，两岸整齐房屋，展现水乡乡村整洁宜居风貌。',
                    category: 'scenery',
                    date: '2026-06-10'
                },
                {
                    id: 4,
                    src: './photoes/4.jpg',
                    thumbnail: './photoes/4.jpg',
                    title: '乡村入口标识',
                    description: '村口道路标识牌，是村落对外展示形象的第一道风景。',
                    category: 'culture',
                    date: '2026-06-10'
                },
                {
                    id: 5,
                    src: './photoes/5.jpg',
                    thumbnail: './photoes/5.jpg',
                    title: '宽阔江景河岸',
                    description: '江边开阔水域，水面平静，展现乡村临水而居的自然生态环境。',
                    category: 'nature',
                    date: '2026-06-10'
                },
                {
                    id: 6,
                    src: './photoes/6.jpg',
                    thumbnail: './photoes/6.jpg',
                    title: '村内老街民居',
                    description: '乡村老街两侧老式楼房，绿树掩映，保留本土居住生活样貌。',
                    category: 'architecture',
                    date: '2026-06-10'
                },
                {
                    id: 7,
                    src: './photoes/7.jpg',
                    thumbnail: './photoes/7.jpg',
                    title: '远江薄雾水景',
                    description: '薄雾笼罩江面，水天相接，静谧温柔的江边自然景色。',
                    category: 'nature',
                    date: '2026-06-10'
                },
                {
                    id: 8,
                    src: './photoes/8.jpg',
                    thumbnail: './photoes/8.jpg',
                    title: '乡村文化活动室',
                    description: '村内文化宣传空间，布置暖心标语，承载乡村精神文明建设。',
                    category: 'culture',
                    date: '2026-06-10'
                },
                {
                    id: 9,
                    src: './photoes/9.jpg',
                    thumbnail: './photoes/9.jpg',
                    title: '郊野绿地孤树',
                    description: '大片平整绿地中独立大树，是村民休闲散步的自然小天地。',
                    category: 'nature',
                    date: '2026-06-10'
                },
                {
                    id: 10,
                    src: './photoes/10.jpg',
                    thumbnail: './photoes/10.jpg',
                    title: '岭南特色居民楼',
                    description: '乡村新式多层民居，外墙充满本土彩绘装饰，独具岭南乡村特色。',
                    category: 'architecture',
                    date: '2026-06-10'
                },
                {
                    id: 11,
                    src: './photoes/11.jpg',
                    thumbnail: './photoes/11.jpg',
                    title: '古巷老榕步道',
                    description: '百年榕树覆盖古巷道，青砖墙搭配石板路，沉淀乡村百年历史底蕴。',
                    category: 'architecture',
                    date: '2026-06-10'
                },
                {
                    id: 12,
                    src: './photoes/12.jpg',
                    thumbnail: './photoes/12.jpg',
                    title: '江上轮渡风光',
                    description: '江面轮渡船只往来，水上交通构成独特的乡村滨水风景线。',
                    category: 'nature',
                    date: '2026-06-10'
                },
            ];

            // ============================================================
            //  🌐 可选：从API获取照片数据的函数接口
            // ============================================================
            async function fetchPhotosFromAPI() {
                return null;
            }

            // ============================================================
            //  应用逻辑
            // ============================================================
            let photos = [];
            let currentFilter = 'all';
            let currentLightboxIndex = -1;
            let filteredPhotos = [];

            // 分类配置
            const categoryConfig = {
                scenery: { name: '田园风光', tagClass: 'tag-scenery', emoji: '🌾' },
                architecture: { name: '古建民居', tagClass: 'tag-architecture', emoji: '🏠' },
                culture: { name: '民俗活动', tagClass: 'tag-culture', emoji: '🎭' },
                nature: { name: '自然生态', tagClass: 'tag-nature', emoji: '🌿' },
                food: { name: '特色美食', tagClass: 'tag-food', emoji: '🍜' },
                craft: { name: '手工艺', tagClass: 'tag-craft', emoji: '🧶' },
            };

            // 初始化
            async function init() {
                const apiData = await fetchPhotosFromAPI();
                if (apiData && Array.isArray(apiData) && apiData.length > 0) {
                    photos = apiData;
                } else {
                    photos = PHOTO_DATA;
                }
                updateStats();
                updateFilterCounts();
                renderGallery();
                bindEvents();
            }

            // 更新统计数据
            function updateStats() {
                document.getElementById('statPhotos').textContent = photos.length;
                const categories = new Set(photos.map(p => p.category));
                document.getElementById('statCategories').textContent = categories.size;
            }

            // 更新筛选按钮上的数量
            function updateFilterCounts() {
                const allCount = photos.length;
                document.querySelector('.filter-btn[data-category="all"] .count').textContent = `(${allCount})`;
                for (const cat of Object.keys(categoryConfig)) {
                    const count = photos.filter(p => p.category === cat).length;
                    const btn = document.querySelector(`.filter-btn[data-category="${cat}"] .count`);
                    if (btn) btn.textContent = `(${count})`;
                }
            }

            // 获取筛选后的照片
            function getFilteredPhotos() {
                if (currentFilter === 'all') return [...photos];
                return photos.filter(p => p.category === currentFilter);
            }

            // 渲染画廊
            function renderGallery() {
                const grid = document.getElementById('galleryGrid');
                const emptyState = document.getElementById('emptyState');
                filteredPhotos = getFilteredPhotos();

                if (filteredPhotos.length === 0) {
                    grid.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                emptyState.style.display = 'none';

                grid.innerHTML = filteredPhotos.map((photo, index) => {
                    const catConfig = categoryConfig[photo.category] || { name: photo.category,
                        tagClass: 'tag-scenery', emoji: '' };
                    const thumbSrc = photo.thumbnail || photo.src;
                    return `
                        <div class="gallery-card"
                             data-index="${index}"
                             data-id="${photo.id}"
                             role="button"
                             tabindex="0"
                             aria-label="查看照片：${photo.title}">
                            <div class="img-placeholder">🖼️</div>
                            <img src="${thumbSrc}"
                                 alt="${photo.title}"
                                 loading="lazy"
                                 onload="this.classList.add('loaded');this.previousElementSibling.style.display='none';"
                                 onerror="this.style.display='none';this.previousElementSibling.style.display='flex';">
                            <div class="card-overlay"></div>
                            <div class="card-info">
                                <span class="card-category-tag ${catConfig.tagClass}">${catConfig.emoji} ${catConfig.name}</span>
                                <div class="card-title">${photo.title}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // 绑定卡片点击事件
                grid.querySelectorAll('.gallery-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const index = parseInt(this.getAttribute('data-index'));
                        openLightbox(index);
                    });
                });
            }

            // 打开灯箱
            function openLightbox(index) {
                currentLightboxIndex = index;
                updateLightboxContent();
                document.getElementById('lightbox').classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            // 关闭灯箱
            function closeLightbox() {
                document.getElementById('lightbox').classList.remove('active');
                document.body.style.overflow = '';
                currentLightboxIndex = -1;
            }

            // 更新灯箱内容
            function updateLightboxContent() {
                if (currentLightboxIndex < 0 || currentLightboxIndex >= filteredPhotos.length) return;
                const photo = filteredPhotos[currentLightboxIndex];
                const img = document.getElementById('lightboxImg');
                const caption = document.getElementById('lightboxCaption');
                img.src = photo.src;
                img.alt = photo.title;
                const catConfig = categoryConfig[photo.category] || { name: photo.category, emoji: '' };
                caption.textContent = `${catConfig.emoji} ${photo.title} — ${photo.description}`;
            }

            // 上一张
            function prevPhoto() {
                if (filteredPhotos.length === 0) return;
                currentLightboxIndex = (currentLightboxIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
                updateLightboxContent();
            }

            // 下一张
            function nextPhoto() {
                if (filteredPhotos.length === 0) return;
                currentLightboxIndex = (currentLightboxIndex + 1) % filteredPhotos.length;
                updateLightboxContent();
            }

            // 绑定所有事件
            function bindEvents() {
                // 筛选按钮
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList
                            .remove('active'));
                        this.classList.add('active');
                        currentFilter = this.getAttribute('data-category');
                        renderGallery();
                    });
                });

                // 灯箱关闭
                document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
                document.getElementById('lightbox').addEventListener('click', function(e) {
                    if (e.target === this) closeLightbox();
                });
                document.getElementById('lightboxPrev').addEventListener('click', prevPhoto);
                document.getElementById('lightboxNext').addEventListener('click', nextPhoto);

                // 键盘导航
                document.addEventListener('keydown', function(e) {
                    const lightbox = document.getElementById('lightbox');
                    if (!lightbox.classList.contains('active')) return;
                    if (e.key === 'Escape') closeLightbox();
                    if (e.key === 'ArrowLeft') prevPhoto();
                    if (e.key === 'ArrowRight') nextPhoto();
                });

                // 触摸滑动支持（灯箱内）
                let touchStartX = 0;
                const lightboxEl = document.getElementById('lightbox');
                lightboxEl.addEventListener('touchstart', function(e) {
                    touchStartX = e.touches[0].clientX;
                }, { passive: true });
                lightboxEl.addEventListener('touchend', function(e) {
                    if (!lightboxEl.classList.contains('active')) return;
                    const diff = e.changedTouches[0].clientX - touchStartX;
                    if (Math.abs(diff) > 60) {
                        if (diff > 0) prevPhoto();
                        else nextPhoto();
                    }
                });

                // 导航栏滚动效果
                const navbar = document.getElementById('navbar');
                window.addEventListener('scroll', function() {
                    if (window.scrollY > 50) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                });

                // 回到顶部按钮
                const backToTopBtn = document.getElementById('backToTop');
                window.addEventListener('scroll', function() {
                    if (window.scrollY > 500) {
                        backToTopBtn.classList.add('visible');
                    } else {
                        backToTopBtn.classList.remove('visible');
                    }
                });
                backToTopBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                // 移动端导航菜单
                const navToggle = document.getElementById('navToggle');
                const navLinks = document.getElementById('navLinks');
                navToggle.addEventListener('click', function() {
                    navLinks.classList.toggle('open');
                    this.textContent = navLinks.classList.contains('open') ? '✕' : '☰';
                });
                // 点击导航链接后关闭菜单
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('open');
                        navToggle.textContent = '☰';
                    });
                });

                // 导航链接高亮
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', function() {
                        document.querySelectorAll('.nav-links a').forEach(l => l.classList
                            .remove('active'));
                        this.classList.add('active');
                    });
                });
            }

            // 启动
            init();

            console.log('🏡 多彩乡村照片展示页面已就绪！');
            console.log('📸 照片数据接口位置：JS中的 PHOTO_DATA 数组');
            console.log('🌐 API接口位置：JS中的 fetchPhotosFromAPI() 函数');
            console.log('📝 修改照片：直接编辑 PHOTO_DATA 数组即可');
            console.log('🎨 分类：scenery(田园) | architecture(古建) | culture(民俗) | nature(自然) | food(美食) | craft(手工艺)');
        })();
    </script>
</body>
</html>
